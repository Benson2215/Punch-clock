<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人簽到</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
      background: #f0f2f5; color: #1a1a2e; min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff; padding: 18px 32px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }
    header h1 { font-size: 1.4rem; letter-spacing: 3px; font-weight: 700; }
    #live-clock { text-align: right; font-size: 1.8rem; font-weight: 700; font-variant-numeric: tabular-nums; color: #e2e8f0; }
    #live-date  { font-size: 0.8rem; color: #a8b2d8; text-align: right; margin-top: 2px; }

    .container { max-width: 600px; margin: 0 auto; padding: 28px 16px; }

    /* ── Card ── */
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); padding: 24px 28px; margin-bottom: 20px; }
    .card-title { font-size: 1rem; font-weight: 700; letter-spacing: 2px; color: #0f3460; border-left: 4px solid #0f3460; padding-left: 10px; margin-bottom: 20px; }

    /* ── Profile banner ── */
    .profile-banner {
      background: #ebf4ff; border: 1px solid #bee3f8; border-radius: 10px;
      padding: 14px 18px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .profile-info .p-name  { font-size: 1.1rem; font-weight: 700; color: #0f3460; }
    .profile-info .p-sub   { font-size: 0.8rem; color: #2b6cb0; margin-top: 2px; }
    .profile-actions       { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-edit {
      background: none; border: 1.5px solid #bee3f8; border-radius: 6px;
      padding: 5px 14px; font-size: 0.8rem; color: #2b6cb0;
      cursor: pointer; font-family: inherit; transition: border-color 0.2s, color 0.2s;
    }
    .btn-edit:hover { border-color: #0f3460; color: #0f3460; }
    .btn-logout {
      background: none; border: 1.5px solid #fed7d7; border-radius: 6px;
      padding: 5px 14px; font-size: 0.8rem; color: #c53030;
      cursor: pointer; font-family: inherit; transition: border-color 0.2s;
    }
    .btn-logout:hover { border-color: #c53030; }

    /* ── Form ── */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-group label { font-size: 0.82rem; font-weight: 700; color: #4a5568; letter-spacing: 1px; }
    .form-group select, .form-group input {
      border: 1.5px solid #cbd5e0; border-radius: 8px; padding: 10px 12px;
      font-size: 0.95rem; font-family: inherit; background: #f7fafc;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group select:focus, .form-group input:focus {
      outline: none; border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,0.12); background: #fff;
    }
    .time-wrap { display: flex; gap: 8px; align-items: center; }
    .time-wrap input { flex: 1; }
    .btn-now {
      background: #0f3460; color: #fff; border: none; border-radius: 8px;
      padding: 10px 14px; font-size: 0.8rem; font-family: inherit; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: background 0.2s;
    }
    .btn-now:hover { background: #16213e; }

    /* ── Buttons ── */
    .btn-primary {
      background: #0f3460; color: #fff; border: none; border-radius: 8px;
      padding: 12px 32px; font-size: 1rem; font-family: inherit; font-weight: 700;
      cursor: pointer; letter-spacing: 2px; width: 100%;
      box-shadow: 0 2px 8px rgba(15,52,96,0.25); transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: #16213e; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary {
      background: #fff; color: #4a5568; border: 1.5px solid #cbd5e0; border-radius: 8px;
      padding: 12px; font-size: 0.9rem; font-family: inherit; font-weight: 600;
      cursor: pointer; letter-spacing: 1px; width: 100%; transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: #0f3460; color: #0f3460; }

    /* ── Record cards ── */
    .record-item {
      border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px;
    }
    .record-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; }
    .badge-收假  { background: #fed7d7; color: #c53030; }
    .badge-大班  { background: #c6f6d5; color: #276749; }
    .badge-小班  { background: #bee3f8; color: #2b6cb0; }
    .badge-校值日 { background: #fefcbf; color: #744210; }
    .record-times { font-size: 0.85rem; color: #4a5568; }
    .record-times span { margin-right: 16px; }
    .status-in  { color: #276749; font-weight: 700; font-size: 0.82rem; }
    .status-out { color: #718096; font-size: 0.82rem; }
    .btn-signout {
      background: #e53e3e; color: #fff; border: none; border-radius: 6px;
      padding: 5px 16px; font-size: 0.8rem; font-family: inherit; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-signout:hover { background: #c53030; }
    .empty-state { text-align: center; padding: 28px; color: #a0aec0; font-size: 0.9rem; letter-spacing: 2px; }

    /* ── Auth Overlay ── */
    #auth-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
      z-index: 2000; display: flex; align-items: center; justify-content: center;
    }
    .auth-box {
      background: #fff; border-radius: 16px; padding: 36px 40px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4); width: 360px; max-width: 92vw;
    }
    .auth-box h2 { font-size: 1.2rem; letter-spacing: 3px; color: #0f3460; margin-bottom: 4px; }
    .auth-box .auth-sub { font-size: 0.8rem; color: #718096; margin-bottom: 24px; }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 2px solid #e2e8f0; }
    .auth-tab {
      flex: 1; padding: 9px; text-align: center; font-size: 0.88rem; font-weight: 700;
      color: #a0aec0; cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: color 0.2s, border-color 0.2s;
    }
    .auth-tab.active { color: #0f3460; border-bottom-color: #0f3460; }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }
    .auth-field { margin-bottom: 14px; }
    .auth-field label { display: block; font-size: 0.8rem; font-weight: 700; color: #4a5568; margin-bottom: 5px; }
    .auth-field input, .auth-field select {
      width: 100%; border: 1.5px solid #cbd5e0; border-radius: 8px;
      padding: 10px 12px; font-size: 0.95rem; font-family: inherit; background: #f7fafc;
      transition: border-color 0.2s;
    }
    .auth-field input:focus, .auth-field select:focus { outline: none; border-color: #0f3460; background: #fff; }
    .auth-hint { font-size: 0.78rem; color: #718096; text-align: center; margin-top: 12px; }

    /* ── Edit Modal ── */
    #edit-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 1000; display: none; align-items: center; justify-content: center;
    }
    #edit-overlay.show { display: flex; }
    #edit-box {
      background: #fff; border-radius: 16px; padding: 32px 36px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3); width: 340px; max-width: 92vw;
    }
    #edit-box h2 { font-size: 1rem; letter-spacing: 3px; color: #0f3460; margin-bottom: 20px; }
    .edit-note { font-size: 0.78rem; color: #718096; margin-bottom: 16px; }
    .edit-actions { display: flex; gap: 10px; margin-top: 20px; }

    /* ── Toast ── */
    #toast {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: #276749; color: #fff; padding: 12px 28px;
      border-radius: 8px; font-weight: 700; font-size: 0.95rem;
      letter-spacing: 1px; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.error { background: #c53030; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>個人簽到</h1>
  </div>
  <div>
    <div id="live-clock">--:--:--</div>
    <div id="live-date">載入中...</div>
  </div>
</header>

<div class="container" id="main-app" style="display:none">

  <!-- Profile banner -->
  <div class="profile-banner">
    <div class="profile-info">
      <div class="p-name" id="p-name">—</div>
      <div class="p-sub"  id="p-sub">—</div>
    </div>
    <div class="profile-actions">
      <button class="btn-edit"   onclick="openEdit()">修改資料</button>
      <button class="btn-logout" onclick="logout()">登出</button>
    </div>
  </div>

  <!-- Sign-in Form -->
  <div class="card">
    <div class="card-title">簽到</div>
    <div class="form-group">
      <label>班別</label>
      <select id="f-shift">
        <option value="">── 請選擇 ──</option>
        <option>收假</option><option>大班</option><option>小班</option><option>校值日</option>
      </select>
    </div>
    <div class="form-group">
      <label>到勤時間</label>
      <div class="time-wrap">
        <input type="time" id="f-checkin">
        <button class="btn-now" onclick="setNow()">現在</button>
      </div>
    </div>
    <div class="form-group">
      <label>備註</label>
      <input type="text" id="f-note" placeholder="選填" maxlength="100">
    </div>
    <button class="btn-primary" onclick="addRecord()">確認簽到</button>
  </div>

  <!-- My Records -->
  <div class="card">
    <div class="card-title">今日紀錄</div>
    <div id="records-list"><div class="empty-state">載入中…</div></div>
  </div>

</div>

<!-- Auth Overlay -->
<div id="auth-overlay">
  <div class="auth-box">
    <h2>個人簽到系統</h2>
    <div class="auth-sub">請登入或建立帳號</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">登入</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">第一次使用</div>
    </div>

    <!-- Login -->
    <div class="auth-panel active" id="panel-login">
      <div class="auth-field">
        <label>姓名</label>
        <input type="text" id="login-name" placeholder="請輸入姓名" maxlength="20"
          onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()">
      </div>
      <div class="auth-field">
        <label>密碼</label>
        <input type="password" id="login-password" placeholder="請輸入密碼"
          onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn-primary" style="margin-top:8px" onclick="login()">登入</button>
    </div>

    <!-- Register -->
    <div class="auth-panel" id="panel-register">
      <div class="auth-field">
        <label>姓名</label>
        <input type="text" id="reg-name" placeholder="請輸入真實姓名" maxlength="20">
      </div>
      <div class="auth-field">
        <label>隊別</label>
        <select id="reg-team">
          <option value="">── 請選擇 ──</option>
          <option>921</option><option>931</option><option>941</option><option>951</option>
          <option>女生隊</option><option>研中</option><option>二技</option>
        </select>
      </div>
      <div class="auth-field">
        <label>職稱</label>
        <select id="reg-rank">
          <option value="">── 請選擇 ──</option>
          <option>中隊長</option><option>訓導</option><option>區隊長</option>
        </select>
      </div>
      <div class="auth-field">
        <label>設定密碼</label>
        <input type="password" id="reg-password" placeholder="請設定密碼">
      </div>
      <div class="auth-field">
        <label>確認密碼</label>
        <input type="password" id="reg-confirm" placeholder="再輸入一次"
          onkeydown="if(event.key==='Enter')register()">
      </div>
      <button class="btn-primary" style="margin-top:8px" onclick="register()">建立帳號</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div id="edit-overlay" onclick="if(event.target===this)closeEdit()">
  <div id="edit-box">
    <h2>修改個人資料</h2>
    <p class="edit-note">姓名不可更改。密碼欄位留空則不修改。</p>
    <div class="auth-field">
      <label>隊別</label>
      <select id="edit-team">
        <option>921</option><option>931</option><option>941</option><option>951</option>
        <option>女生隊</option><option>研中</option><option>二技</option>
      </select>
    </div>
    <div class="auth-field">
      <label>職稱</label>
      <select id="edit-rank">
        <option>中隊長</option><option>訓導</option><option>區隊長</option>
      </select>
    </div>
    <div class="auth-field">
      <label>新密碼（選填）</label>
      <input type="password" id="edit-password" placeholder="留空表示不更改">
    </div>
    <div class="auth-field">
      <label>確認新密碼</label>
      <input type="password" id="edit-confirm" placeholder="留空表示不更改">
    </div>
    <div class="edit-actions">
      <button class="btn-primary" style="width:auto;padding:11px 24px" onclick="saveEdit()">儲存</button>
      <button class="btn-secondary" onclick="closeEdit()">取消</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════
   設定區
   ══════════════════════════════════════════════════════ */
const SUPABASE_URL = 'https://tcacykchwcilayzvlrsu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRjYWN5a2Nod2NpbGF5enZscnN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0OTIyMDUsImV4cCI6MjA5OTA2ODIwNX0.vMCdM9Wn76lI7VeXMNXcGzy4qV7Cq0Ky4Tg5avfplPo';
const OFFICE_LAT = 25.047623;
const OFFICE_LNG = 121.352090;
const RADIUS_M   = 500;
/* ══════════════════════════════════════════════════════ */

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const SESSION_KEY = 'attendance_session';
let session = null;
let records = [];

/* ── Hash ── */
async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

/* ── Auth tabs ── */
function switchTab(tab) {
  ['login','register'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`panel-${t}`).classList.toggle('active', t === tab);
  });
}

/* ── Login ── */
async function login() {
  const name = document.getElementById('login-name').value.trim();
  const pw   = document.getElementById('login-password').value;
  if (!name || !pw) { showToast('請填寫姓名與密碼', true); return; }

  const hashed = await hashPw(pw);
  const { data, error } = await db.from('profiles')
    .select('*').eq('name', name).eq('password', hashed).maybeSingle();

  if (error || !data) { showToast('姓名或密碼錯誤', true); return; }

  session = { id: data.id, name: data.name, team: data.team, rank: data.rank };
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
  enterApp();
}

/* ── Register ── */
async function register() {
  const name    = document.getElementById('reg-name').value.trim();
  const team    = document.getElementById('reg-team').value;
  const rank    = document.getElementById('reg-rank').value;
  const pw      = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;

  if (!name)         { showToast('請輸入姓名', true); return; }
  if (!team)         { showToast('請選擇隊別', true); return; }
  if (!rank)         { showToast('請選擇職稱', true); return; }
  if (!pw)           { showToast('請設定密碼', true); return; }
  if (pw !== confirm){ showToast('兩次密碼不一致', true); return; }

  const hashed = await hashPw(pw);
  const { data, error } = await db.from('profiles')
    .insert({ name, team, rank, password: hashed }).select().maybeSingle();

  if (error) {
    showToast(error.code === '23505' ? '此姓名已被使用' : '建立失敗：' + error.message, true);
    return;
  }

  session = { id: data.id, name, team, rank };
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
  enterApp();
}

/* ── Logout ── */
function logout() {
  localStorage.removeItem(SESSION_KEY);
  session = null;
  records = [];
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('auth-overlay').style.display = 'flex';
  document.getElementById('login-name').value = '';
  document.getElementById('login-password').value = '';
  switchTab('login');
}

/* ── Enter app ── */
function enterApp() {
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  document.getElementById('p-name').textContent = session.name;
  document.getElementById('p-sub').textContent  = `${session.team}　${session.rank}`;
  loadRecords();
}

/* ── Edit profile ── */
function openEdit() {
  document.getElementById('edit-team').value    = session.team;
  document.getElementById('edit-rank').value    = session.rank;
  document.getElementById('edit-password').value = '';
  document.getElementById('edit-confirm').value  = '';
  document.getElementById('edit-overlay').classList.add('show');
}
function closeEdit() {
  document.getElementById('edit-overlay').classList.remove('show');
}
async function saveEdit() {
  const team      = document.getElementById('edit-team').value;
  const rank      = document.getElementById('edit-rank').value;
  const newPw     = document.getElementById('edit-password').value;
  const confirmPw = document.getElementById('edit-confirm').value;

  if (newPw && newPw !== confirmPw) { showToast('兩次密碼不一致', true); return; }

  const update = { team, rank };
  if (newPw) update.password = await hashPw(newPw);

  const { error } = await db.from('profiles').update(update).eq('id', session.id);
  if (error) { showToast('更新失敗：' + error.message, true); return; }

  session.team = team;
  session.rank = rank;
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
  document.getElementById('p-sub').textContent = `${session.team}　${session.rank}`;
  showToast('資料已更新');
  closeEdit();
}

/* ── Clock ── */
const WEEKDAY = ['日','一','二','三','四','五','六'];
function tickClock() {
  const now = new Date();
  document.getElementById('live-clock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const roc = now.getFullYear() - 1911;
  document.getElementById('live-date').textContent =
    `民國 ${roc} 年 ${String(now.getMonth()+1).padStart(2,'0')} 月 ${String(now.getDate()).padStart(2,'0')} 日（星期${WEEKDAY[now.getDay()]}）`;
}
setInterval(tickClock, 1000);
tickClock();

function setNow() {
  const now = new Date();
  document.getElementById('f-checkin').value =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

function todayRocDate() {
  const d = new Date();
  return `${d.getFullYear()-1911}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

/* ── GPS ── */
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000, toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function checkLocation() {
  return new Promise((resolve, reject) => {
    if (!OFFICE_LAT && !OFFICE_LNG) { resolve(); return; }
    if (!navigator.geolocation)     { resolve(); return; }
    showToast('定位中，請稍候…');
    navigator.geolocation.getCurrentPosition(
      pos => {
        const dist = haversine(pos.coords.latitude, pos.coords.longitude, OFFICE_LAT, OFFICE_LNG);
        dist <= RADIUS_M ? resolve() : reject(`距離辦公室 ${Math.round(dist)} 公尺，超出範圍`);
      },
      () => reject('無法取得位置，請允許定位權限後再試'),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });
}

/* ── Add record ── */
async function addRecord() {
  const shift   = document.getElementById('f-shift').value;
  const checkin = document.getElementById('f-checkin').value;
  if (!shift)   { showToast('請選擇班別', true); return; }
  if (!checkin) { showToast('請填寫到勤時間', true); return; }

  try { await checkLocation(); }
  catch (msg) { showToast(msg, true); return; }

  const note = document.getElementById('f-note').value.trim();
  const { error } = await db.from('attendance').insert({
    roc_date: todayRocDate(),
    team: session.team,
    rank: session.rank,
    name: session.name,
    shift, checkin,
    note: note || null
  });

  if (error) { showToast('簽到失敗：' + error.message, true); return; }
  document.getElementById('f-shift').value   = '';
  document.getElementById('f-checkin').value = '';
  document.getElementById('f-note').value    = '';
  showToast(`✓ ${session.name} 簽到成功`);
  await loadRecords();
}

/* ── Sign out ── */
async function signOut(id) {
  try { await checkLocation(); }
  catch (msg) { showToast(msg, true); return; }

  const now = new Date();
  const roc = now.getFullYear() - 1911;
  const { error } = await db.from('attendance').update({
    checkout:      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
    checkout_date: `${roc}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`
  }).eq('id', id).eq('name', session.name);

  if (error) { showToast('退勤失敗：' + error.message, true); return; }
  showToast('✓ 退勤登記完成');
  await loadRecords();
}

/* ── Load & Render ── */
async function loadRecords() {
  const { data, error } = await db.from('attendance')
    .select('*').eq('roc_date', todayRocDate()).eq('name', session.name).order('id');
  if (error) { showToast('載入失敗：' + error.message, true); return; }
  records = data || [];
  renderList();
}

function renderList() {
  const el = document.getElementById('records-list');
  if (records.length === 0) { el.innerHTML = '<div class="empty-state">今日尚無簽到記錄</div>'; return; }
  el.innerHTML = records.map(r => `
    <div class="record-item">
      <div class="record-top">
        <span class="badge badge-${r.shift}">${esc(r.shift)}</span>
        ${r.checkout
          ? `<span class="status-out">已退勤</span>`
          : `<button class="btn-signout" onclick="signOut(${r.id})">退勤</button>`}
      </div>
      <div class="record-times" style="margin-top:8px">
        <span>到勤　${esc(r.roc_date)} ${esc(r.checkin)}</span>
        ${r.checkout ? `<span>退勤　${esc(r.checkout_date||r.roc_date)} ${esc(r.checkout)}</span>` : ''}
      </div>
      ${r.note ? `<div style="font-size:0.82rem;color:#718096;margin-top:6px">${esc(r.note)}</div>` : ''}
    </div>`).join('');
}

/* ── Toast & Util ── */
let toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = isError ? 'error' : '';
  requestAnimationFrame(() => el.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Init ── */
const saved = localStorage.getItem(SESSION_KEY);
if (saved) {
  session = JSON.parse(saved);
  enterApp();
} else {
  document.getElementById('auth-overlay').style.display = 'flex';
}
</script>
